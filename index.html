<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NOTE管理 - 多人獨立分流版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Source+Han+Serif+TW:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Source Han Serif TW', serif; background-color: #FAF0E6; color: #5D4037; margin: 0; }
    .mobile-container { max-width: 480px; margin: 0 auto; min-height: 100vh; position: relative; overflow-x: hidden; background-color: rgba(250, 240, 230, 0.4); }
    .mobile-container::before {
      content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background-image: url('./Gemini_Generated_Image_jpq8cwjpq8cwjpq8.png'); 
      background-size: cover; background-position: center; background-attachment: fixed; opacity: 0.8; z-index: -1;
    }
    .slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .fade-in { animation: fadeIn 0.2s ease-out forwards; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    ::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .snap-x-mandatory { scroll-snap-type: x mandatory; }
    .snap-center { scroll-snap-align: center; }
    .task-card { background-color: rgba(255, 255, 255, 0.92); backdrop-filter: blur(6px); border: 1px solid rgba(215, 204, 200, 0.6); box-shadow: 0 6px 20px rgba(93, 64, 55, 0.15); }
    select { -webkit-appearance: none; -moz-appearance: none; appearance: none; text-align: center; background-color: transparent; color: #5D4037; }
    #fabBtn { background-color: #5D4037; box-shadow: 0 8px 30px rgba(93, 64, 55, 0.4); }
  </style>
</head>
<body class="text-gray-900 pb-24">

<div class="mobile-container pb-24">

  <!-- 頂部導航列 -->
  <header class="pt-10 pb-2 px-5 sticky top-0 bg-[#FFF8F0]/95 backdrop-blur-md z-10 border-b border-[#D7CCC8]/30">
    <div class="flex justify-between items-end mb-4">
      <div>
        <h1 class="text-3xl font-bold tracking-wider text-[#5D4037]">NOTE管理</h1>
        <!-- 顯示目前的使用者標籤 -->
        <div class="flex items-center gap-2 mt-1.5">
          <span class="inline-block w-2 h-2 rounded-full bg-green-500"></span>
          <span id="userBadge" class="text-xs text-[#8D6E63] font-medium tracking-wide">使用者: 載入中...</span>
          <button onclick="switchUserPrompt()" class="text-[10px] text-[#5D4037] underline ml-1 opacity-70 hover:opacity-100">切換</button>
        </div>
      </div>
      <!-- 清空回收桶按鈕 -->
      <button id="emptyTrashBtn" onclick="confirmEmptyTrash()" class="hidden text-sm text-[#FF8A80] font-medium px-4 py-1.5 bg-[#FFEBEE]/90 rounded-full hover:bg-red-100 transition-colors">
        清空全部
      </button>
    </div>
    
    <div class="flex gap-4 text-[16px] font-medium text-[#8D6E63] border-b border-[#D7CCC8]/50 pb-2 overflow-x-auto no-scrollbar">
      <button id="tabTodo" onclick="switchTab('todo')" class="text-black border-b-2 border-black pb-2 px-1 transition-colors flex-shrink-0">待辦事</button>
      <button id="tabNote" onclick="switchTab('note')" class="pb-2 px-1 transition-colors hover:text-gray-600 flex-shrink-0">筆記本</button>
      <button id="tabFavorite" onclick="switchTab('favorite')" class="pb-2 px-1 transition-colors hover:text-gray-600 flex-shrink-0">收藏</button>
      <button id="tabTrash" onclick="switchTab('trash')" class="pb-2 px-1 transition-colors hover:text-gray-600 flex-shrink-0">回收桶</button>
    </div>
  </header>

  <!-- 雲端連線狀態提示 -->
  <div id="loadingState" class="text-center text-[#8D6E63] mt-24 font-medium tracking-wide">
    雲端安全同步連線中...
  </div>

  <!-- 卡片列表區 -->
  <div id="taskList" class="px-5 mt-5 space-y-5 hidden"></div>

  <!-- 懸浮新增按鈕 -->
  <button id="fabBtn" onclick="openModal()" class="fixed bottom-8 right-6 w-16 h-16 rounded-full flex items-center justify-center hover:scale-105 transition-transform z-40 active:scale-95">
    <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
  </button>

  <!-- 彈出視窗 -->
  <div id="actionModal" class="absolute inset-0 bg-black/50 z-50 flex items-end hidden backdrop-blur-sm transition-opacity">
    <div class="bg-white w-full rounded-t-[32px] p-6 pb-10 shadow-2xl slide-up max-h-[90vh] overflow-y-auto no-scrollbar relative">
      <div class="flex justify-between items-center mb-6">
        <h3 id="modalTitle" class="text-xl font-bold text-[#5D4037]">新增</h3>
        <button onclick="closeModal()" class="p-2 -mr-2 text-gray-400 hover:text-black">
          <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
        </button>
      </div>
      
      <div class="flex gap-3 mb-5 bg-[#F5F5DC] p-1.5 rounded-xl border border-[#D7CCC8]">
        <button id="typeTodoBtn" onclick="setType('todo')" class="flex-1 py-2 bg-white rounded-lg shadow-sm font-medium text-sm text-[#5D4037]">待辦事項</button>
        <button id="typeNoteBtn" onclick="setType('note')" class="flex-1 py-2 text-[#8D6E63] font-medium text-sm">一般筆記</button>
      </div>

      <textarea id="taskInput" rows="3" placeholder="輸入內容..." class="w-full text-[19px] mb-4 outline-none placeholder-gray-300 font-medium bg-transparent resize-none text-[#5D4037] leading-relaxed"></textarea>

      <div id="timeContainer" class="flex items-center gap-3 mb-6 bg-[#FAF0E6] p-3.5 rounded-2xl border border-[#D7CCC8]">
        <svg class="w-5 h-5 text-[#8D6E63] flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
        <div class="flex flex-grow items-center gap-2">
          <input type="date" id="dateInput" class="bg-transparent outline-none text-[#5D4037] font-sans text-[15px] flex-grow">
          <div class="w-px h-5 bg-[#D7CCC8]"></div>
          <select id="hourInput" class="bg-transparent outline-none text-[#5D4037] font-sans text-[16px] font-medium w-10"></select>
          <span class="text-gray-500 font-bold">:</span>
          <select id="minuteInput" class="bg-transparent outline-none text-[#5D4037] font-sans text-[16px] font-medium w-10">
            <option value="00">00</option><option value="10">10</option>
            <option value="20">20</option><option value="30">30</option>
            <option value="40">40</option><option value="50">50</option>
          </select>
        </div>
      </div>

      <div id="previewContainer" class="flex gap-3 overflow-x-auto no-scrollbar mb-6 pb-2 hidden"></div>

      <div class="flex justify-between items-center mt-2">
        <input type="file" id="fileInput" accept="image/*" multiple class="hidden" onchange="handleFileSelect(event)">
        <button onclick="document.getElementById('fileInput').click()" class="p-3.5 bg-[#FAF0E6] rounded-full hover:bg-[#F5F5DC] transition-colors flex items-center gap-2 border border-[#D7CCC8]">
          <svg class="w-6 h-6 text-[#5D4037]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
          <span class="text-[15px] font-medium text-[#5D4037] pr-2">圖片</span>
        </button>
        <button id="saveBtn" onclick="saveTask()" class="px-8 py-3.5 bg-[#5D4037] text-white rounded-full font-medium tracking-widest shadow-sm">新增</button>
      </div>
    </div>
  </div>

  <!-- 刪除確認視窗 -->
  <div id="confirmModal" class="absolute inset-0 bg-black/60 z-[60] flex items-center justify-center hidden backdrop-blur-sm px-6">
    <div class="bg-white w-full max-w-sm rounded-3xl p-6 shadow-2xl fade-in text-center border-2 border-red-100">
      <div class="w-16 h-16 bg-[#FFEBEE] text-[#FF8A80] rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
      </div>
      <h3 id="confirmModalTitle" class="text-xl font-bold mb-2 text-[#5D4037]">徹底刪除？</h3>
      <div class="flex gap-3 mt-6">
        <button onclick="closeConfirmModal()" class="flex-1 py-3 bg-[#FAF0E6] text-[#8D6E63] rounded-xl font-medium border border-[#D7CCC8]">取消</button>
        <button onclick="executePermanentDelete()" class="flex-1 py-3 bg-[#FF8A80] text-white rounded-xl font-medium shadow-md">確認</button>
      </div>
    </div>
  </div>

</div>

<!-- 引入 Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, collection, addDoc, doc, updateDoc, deleteDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";

  // 精確綁定 vibe-todo-system 金鑰
  const firebaseConfig = {
    apiKey: "AIzaSyCluvLm7VnGxdOdR71ZAjRvM5_VYOY50YY",
    authDomain: "vibe-todo-system.firebaseapp.com",
    projectId: "vibe-todo-system",
    storageBucket: "vibe-todo-system.firebasestorage.app",
    messagingSenderId: "990958267138",
    appId: "1:990958267138:web:9f37b03b3048b2f33b301b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const storage = getStorage(app);

  // 【智慧多用戶架構核心】
  // 優先抓網址參數 ?u=老大，其次抓瀏覽器記憶庫。如果都沒有，就彈窗問名字
  let urlParams = new URLSearchParams(window.location.search);
  let currentUser = urlParams.get('u') || localStorage.getItem('note_current_user');
  
  if (!currentUser) {
    currentUser = prompt("請輸入您的使用者名稱或代碼（例如：主管、現場）：") || "未知使用者";
    currentUser = currentUser.trim();
    localStorage.setItem('note_current_user', currentUser);
  } else {
    localStorage.setItem('note_current_user', currentUser);
  }
  
  // 更新畫面的使用者標籤
  document.getElementById('userBadge').innerText = `使用者: ${currentUser}`;

  // 提供手動切換功能
  window.switchUserPrompt = function() {
    let newUser = prompt("請輸入切換後的使用者名稱：", currentUser);
    if(newUser && newUser.trim() !== "") {
      localStorage.setItem('note_current_user', newUser.trim());
      window.location.reload(); // 重新整理立即切換資料串流
    }
  }

  // 全域變數
  window.tasks = [];
  window.currentTab = 'todo';
  window.currentActionType = 'todo';
  window.editingTaskId = null;
  window.tempImages = []; 
  window.taskToDeleteForever = null;
  window.isEmptyingAll = false;

  // 初始化小時
  const hourInput = document.getElementById('hourInput');
  for (let i = 0; i < 24; i++) {
    const val = String(i).padStart(2, '0');
    hourInput.innerHTML += `<option value="${val}">${val}</option>`;
  }

  // 雲端資料即時監聽
  const q = query(collection(db, "tasks"), orderBy("createdAt", "desc"));
  onSnapshot(q, (snapshot) => {
    window.tasks = [];
    snapshot.forEach((doc) => {
      const data = doc.data();
      
      // 【分流判定】：只有當資料的 userId 符合目前使用者，或者這筆資料是以前「還沒有分流前」的歷史資料，才會顯示。
      if (data.userId === currentUser || !data.userId) {
        window.tasks.push({ id: doc.id, ...data });
      }
    });
    document.getElementById('loadingState').classList.add('hidden');
    document.getElementById('taskList').classList.remove('hidden');
    renderTasks();
  });

  // 功能邏輯
  window.switchTab = function(tab) {
    window.currentTab = tab;
    ['todo', 'note', 'favorite', 'trash'].forEach(t => {
      document.getElementById(`tab${t.charAt(0).toUpperCase() + t.slice(1)}`).className = 
        t === tab ? "text-black border-b-2 border-black pb-2 px-1 flex-shrink-0" : "text-[#8D6E63] pb-2 px-1 hover:text-[#5D4037] flex-shrink-0";
    });
    document.getElementById('fabBtn').style.display = tab === 'trash' ? 'none' : 'flex';
    document.getElementById('emptyTrashBtn').style.display = tab === 'trash' && window.tasks.some(t => t.isDeleted) ? 'block' : 'none';
    renderTasks();
  }

  window.setType = function(type) {
    window.currentActionType = type;
    document.getElementById('typeTodoBtn').className = type === 'todo' ? "flex-1 py-2 bg-white rounded-lg shadow-sm font-medium text-sm text-[#5D4037]" : "flex-1 py-2 text-[#8D6E63] font-medium text-sm";
    document.getElementById('typeNoteBtn').className = type === 'note' ? "flex-1 py-2 bg-white rounded-lg shadow-sm font-medium text-sm text-[#5D4037]" : "flex-1 py-2 text-[#8D6E63] font-medium text-sm";
    document.getElementById('timeContainer').style.display = type === 'todo' ? 'flex' : 'none';
  }

  window.openModal = function(id = null) {
    window.editingTaskId = id;
    window.tempImages = [];
    if (id) {
      const task = window.tasks.find(t => t.id === id);
      setType(task.type);
      document.getElementById('taskInput').value = task.title;
      if(task.images) {
        window.tempImages = task.images.map(url => ({ file: null, url: url }));
      }
      if (task.deadline) {
        const d = new Date(task.deadline);
        document.getElementById('dateInput').value = d.toLocaleDateString('en-CA');
        document.getElementById('hourInput').value = String(d.getHours()).padStart(2, '0');
        document.getElementById('minuteInput').value = String(d.getMinutes()).padStart(2, '0');
      } else {
        document.getElementById('dateInput').value = '';
      }
    } else {
      setType(window.currentTab === 'trash' || window.currentTab === 'favorite' ? 'todo' : window.currentTab);
      document.getElementById('taskInput').value = '';
      document.getElementById('dateInput').value = new Date().toLocaleDateString('en-CA');
      document.getElementById('hourInput').value = '12';
      document.getElementById('minuteInput').value = '00';
    }
    renderImagePreview();
    document.getElementById('actionModal').classList.remove('hidden');
  }

  window.closeModal = function() { document.getElementById('actionModal').classList.add('hidden'); }
  window.handleFileSelect = function(e) { Array.from(e.target.files).forEach(f => window.tempImages.push({ file: f, url: URL.createObjectURL(f) })); renderImagePreview(); e.target.value = ''; }
  window.removeTempImage = function(i) { window.tempImages.splice(i, 1); renderImagePreview(); }
  
  window.renderImagePreview = function() {
    const container = document.getElementById('previewContainer');
    if (window.tempImages.length === 0) { container.classList.add('hidden'); return; }
    container.classList.remove('hidden');
    container.innerHTML = window.tempImages.map((img, i) => `<div class="relative w-20 h-20 flex-shrink-0"><img src="${img.url}" class="w-full h-full object-cover rounded-xl border border-[#D7CCC8] shadow-sm"><button onclick="removeTempImage(${i})" class="absolute -top-2 -right-2 bg-[#5D4037] text-white w-6 h-6 rounded-full text-xs shadow-md">✕</button></div>`).join('');
  }

  window.saveTask = async function() {
    const title = document.getElementById('taskInput').value.trim();
    if (!title) return;
    const saveBtn = document.getElementById('saveBtn');
    saveBtn.innerText = "上傳中...";
    saveBtn.disabled = true;

    const finalImageUrls = [];
    for (let img of window.tempImages) {
      if (img.file) {
        const fileRef = ref(storage, `images/${Date.now()}_${img.file.name}`);
        const uploadResult = await uploadBytes(fileRef, img.file);
        const downloadUrl = await getDownloadURL(uploadResult.ref);
        finalImageUrls.push(downloadUrl);
      } else {
        finalImageUrls.push(img.url);
      }
    }

    let deadline = null;
    if (window.currentActionType === 'todo') {
      const dateVal = document.getElementById('dateInput').value;
      const hourVal = document.getElementById('hourInput').value;
      const minuteVal = document.getElementById('minuteInput').value;
      if (dateVal) deadline = `${dateVal}T${hourVal}:${minuteVal}:00`;
    }

    const payload = { 
      title, 
      images: finalImageUrls, 
      type: window.currentActionType, 
      deadline: deadline, 
      userId: currentUser, // 【核心修改】打上目前使用者的蓋章，作為資料分流依據
      updatedAt: new Date().toISOString() 
    };

    if (window.editingTaskId) {
      await updateDoc(doc(db, "tasks", window.editingTaskId), payload);
    } else {
      payload.createdAt = new Date().toISOString();
      payload.isCompleted = false;
      payload.isDeleted = false;
      payload.isFavorite = false;
      await addDoc(collection(db, "tasks"), payload);
    }
    saveBtn.innerText = "新增";
    saveBtn.disabled = false;
    closeModal();
  }

  window.toggleComplete = async function(id) {
    const t = window.tasks.find(x => x.id === id);
    if(t) await updateDoc(doc(db, "tasks", id), { isCompleted: !t.isCompleted, completedAt: !t.isCompleted ? Date.now() : null });
  }
  window.toggleDelete = async function(id, isDel) { await updateDoc(doc(db, "tasks", id), { isDeleted: isDel }); }
  window.toggleFavorite = async function(id) { const t = window.tasks.find(x => x.id === id); if(t) await updateDoc(doc(db, "tasks", id), { isFavorite: !t.isFavorite }); }
  window.confirmPermanentDelete = function(id) { window.taskToDeleteForever = id; window.isEmptyingAll = false; document.getElementById('confirmModalTitle').innerText = '確定要徹底刪除？'; document.getElementById('confirmModal').classList.remove('hidden'); }
  window.confirmEmptyTrash = function() { window.isEmptyingAll = true; window.taskToDeleteForever = null; document.getElementById('confirmModalTitle').innerText = '清空回收桶？'; document.getElementById('confirmModal').classList.remove('hidden'); }
  window.closeConfirmModal = function() { window.taskToDeleteForever = null; window.isEmptyingAll = false; document.getElementById('confirmModal').classList.add('hidden'); }
  
  window.executePermanentDelete = async function() {
    if (window.isEmptyingAll) {
      const trashTasks = window.tasks.filter(t => t.isDeleted);
      for(let t of trashTasks) { await deleteDoc(doc(db, "tasks", t.id)); }
    } else if (window.taskToDeleteForever) {
      await deleteDoc(doc(db, "tasks", window.taskToDeleteForever));
    }
    closeConfirmModal();
  }

  function format24H(dateString) {
    if(!dateString) return '';
    const d = new Date(dateString);
    return `${d.getFullYear()}/${String(d.getMonth() + 1).padStart(2, '0')}/${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
  }

  function renderTasks() {
    const now = Date.now();
    window.tasks.forEach(async (t) => {
      if (t.isCompleted && t.completedAt && (now - t.completedAt > 24 * 60 * 60 * 1000) && !t.isDeleted) {
        await updateDoc(doc(db, "tasks", t.id), { isDeleted: true });
      }
    });

    const list = document.getElementById('taskList');
    list.innerHTML = '';
    
    let filteredTasks = [];
    if (window.currentTab === 'trash') filteredTasks = window.tasks.filter(t => t.isDeleted);
    else if (window.currentTab === 'favorite') filteredTasks = window.tasks.filter(t => !t.isDeleted && t.isFavorite);
    else filteredTasks = window.tasks.filter(t => !t.isDeleted && !t.isFavorite && t.type === window.currentTab);

    if (window.currentTab === 'todo') {
      let active = filteredTasks.filter(t => !t.isCompleted);
      let completed = filteredTasks.filter(t => t.isCompleted);
      active.sort((a, b) => (!a.deadline && !b.deadline) ? b.id - a.id : (!a.deadline ? 1 : (!b.deadline ? -1 : new Date(a.deadline) - new Date(b.deadline))));
      completed.sort((a, b) => (b.completedAt || 0) - (a.completedAt || 0));
      filteredTasks = [...active, ...completed];
    } else {
      filteredTasks.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    }

    if (filteredTasks.length === 0) {
      list.innerHTML = `<div class="text-center text-[#8D6E63] mt-24 flex flex-col items-center"><svg class="w-12 h-12 mb-3 opacity-30" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg><p>目前空空如也</p></div>`;
      return;
    }

    filteredTasks.forEach(task => {
      let timeStatus = { border: 'border-transparent', bg: 'bg-[#FDF5E6]/95', color: 'text-[#8D6E63]', label: '' };
      let deadlineStr = task.type === 'todo' ? (task.deadline ? format24H(task.deadline) : '不指定時間') : format24H(task.createdAt);
      if (task.type === 'todo') {
        const target = new Date(task.deadline);
        const today = new Date();
        const diffDays = (new Date(target.getFullYear(), target.getMonth(), target.getDate()) - new Date(today.getFullYear(), today.getMonth(), today.getDate())) / (1000 * 60 * 60 * 24);
        if (diffDays <= 0) timeStatus = { state: 'today', color: 'text-[#FF8A80]', border: 'border-red-200', bg: 'bg-[#FFEBEE]/70', label: '今天' };
        else if (diffDays <= 3) timeStatus = { state: '3days', color: 'text-[#FFB74D]', border: 'border-amber-200', bg: 'bg-[#FFF8E1]/95', label: '3天內' };
        else if (diffDays <= 7) timeStatus = { state: '7days', color: 'text-[#90CAF9]', border: 'border-sky-200', bg: 'bg-[#E3F2FD]/95', label: '1週內' };
        else timeStatus = { state: 'normal', color: 'text-[#8D6E63]', border: 'border-transparent', bg: 'bg-[#FDF5E6]/95', label: '一般' };
      }
      if (task.isCompleted) timeStatus = { border: 'border-transparent', bg: 'bg-[#FDF5E6]/95', color: 'text-[#8D6E63]', label: '' };

      const completedStyle = task.isCompleted ? 'opacity-40 grayscale' : '';
      const textStrike = task.isCompleted ? 'line-through text-[#8D6E63]' : 'text-[#5D4037]';

      let imagesHTML = '';
      if (task.images && task.images.length > 0) {
        const imgTags = task.images.map(src => `<div class="w-[85%] h-56 flex-shrink-0 snap-center rounded-2xl bg-[#FDF5E6] flex items-center justify-center overflow-hidden border border-[#D7CCC8] shadow-inner"><img src="${src}" class="w-full h-full object-contain"></div>`).join('');
        imagesHTML = `<div class="px-5 pb-5"><div class="flex gap-3 overflow-x-auto no-scrollbar snap-x-mandatory pb-2">${imgTags}</div></div>`;
      }

      let buttonsHTML = currentTab !== 'trash' ? `
        <div class="flex flex-col gap-1.5 -mr-2 items-center flex-shrink-0 w-10">
          <button onclick="toggleFavorite('${task.id}')" class="p-1.5 hover:scale-110 active:scale-90 transition-transform">${task.isFavorite ? `<svg class="w-6 h-6 text-[#FFB74D]" fill="currentColor" viewBox="0 0 24 24"><path d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>` : `<svg class="w-6 h-6 text-[#D7CCC8]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z"/></svg>`}</button>
          <button onclick="openModal('${task.id}')" class="p-1.5 text-[#8D6E63] hover:text-[#5D4037] active:scale-90"><svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg></button>
          <button onclick="toggleDelete('${task.id}', true)" class="p-1.5 text-red-200 hover:text-[#FF8A80] active:scale-90"><svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg></button>
        </div>` : `
        <div class="flex flex-col gap-2 pl-2 flex-shrink-0 w-16">
          <button onclick="toggleDelete('${task.id}', false)" class="w-full py-1.5 bg-[#5D4037] text-white text-[13px] rounded-full active:scale-95">復原</button>
          <button onclick="confirmPermanentDelete('${task.id}')" class="w-full py-1.5 bg-[#FFEBEE] text-[#FF8A80] text-[13px] rounded-full active:scale-95 font-medium border border-red-100">刪除</button>
        </div>`;

      const checkbox = (task.type === 'todo' && window.currentTab !== 'trash') ? `<button class="flex-shrink-0 w-7 h-7 rounded-full border-2 mt-1 flex items-center justify-center transition-colors ${task.isCompleted ? 'bg-[#5D4037] border-[#5D4037]' : 'border-[#D7CCC8]'}" onclick="toggleComplete('${task.id}')">${task.isCompleted ? '<svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7" /></svg>' : ''}</button>` : '';
      const statusBadge = timeStatus.label && !task.isCompleted ? `<span class="px-2 py-0.5 rounded text-[11px] font-bold ${timeStatus.bg} ${timeStatus.color}">${timeStatus.label}</span>` : '';

      const cardHTML = `
        <div class="task-card rounded-[24px] transition-all duration-300 ${completedStyle} w-full overflow-hidden">
          <div class="p-5 flex items-start gap-3 w-full">
            ${checkbox}
            <div class="flex-1 min-w-0 pt-0.5">
              <h2 class="text-[19px] font-medium leading-relaxed ${textStrike} whitespace-pre-wrap break-all">${task.title}</h2>
              <div class="text-[13px] ${timeStatus.color} mt-2.5 font-mono flex items-center gap-1.5 flex-wrap">
                <svg class="w-3.5 h-3.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                ${deadlineStr}
                ${statusBadge}
              </div>
            </div>
            ${buttonsHTML}
          </div>
          ${imagesHTML}
        </div>`;
      list.insertAdjacentHTML('beforeend', cardHTML);
    });
  }
</script>
</body>
</html>
